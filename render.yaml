services:
  - type: web
    name: kash-ai
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: SESSION_HTTPS_ONLY
        value: "true"
      - key: HTTPS_REDIRECT_ENABLED
        value: "true"
      - key: REQUIRE_HTTPS_IN_PRODUCTION
        value: "true"
      - key: TRUSTED_HOSTS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_USERNAMES
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ayurveda-clinic-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: AI_ENABLED
        value: "true"
      - key: STARTUP_RAG_WARMUP
        value: "false"
      - key: STARTUP_LLM_WARMUP
        value: "false"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: GUNICORN_THREADS
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "120"
      - key: MAX_CONCURRENT_REQUESTS
        value: "120"
      - key: OVERLOAD_QUEUE_TIMEOUT_SECONDS
        value: "2.5"
      - key: DB_POOL_SIZE
        value: "12"
      - key: DB_MAX_OVERFLOW
        value: "18"
      - key: DB_POOL_TIMEOUT_SECONDS
        value: "15"
      - key: DB_POOL_RECYCLE_SECONDS
        value: "1800"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GOOGLE_SPEECH_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_MODE
        value: test
      - key: ENABLE_WHATSAPP_API
        value: "false"
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_TEMPLATE_NAME
        sync: false
      - key: WHATSAPP_TEMPLATE_LANGUAGE_CODE
        value: en_US
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
databases:
  - name: ayurveda-clinic-db
    plan: free
    region: oregon
    databaseName: ayurveda_clinic
    user: ayurveda_clinic_user

services:
  - type: web
    name: kash-ai
    runtime: python
    repo: https://github.com/Shikhargoyal3456/ayurveda-clinic-app
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PORT
        value: 10000
    autoDeploy: true

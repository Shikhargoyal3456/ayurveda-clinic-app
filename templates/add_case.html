<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Case</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body class="app-shell">
    <div class="container py-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <p class="eyebrow mb-1">Case Sheet</p>
                        <h1 class="h3 mb-0">Add Case for {{ patient.name }}</h1>
                    </div>
                    <a href="/dashboard" class="btn btn-outline-dark">Back to Dashboard</a>
                </div>
                {% if flash %}
                <div class="alert alert-{{ flash.category }}">{{ flash.message }}</div>
                {% endif %}
                <div class="card border-0 bg-light mb-4">
                  <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
                      <div>
                        <p class="eyebrow mb-1">Voice To Text</p>
                        <h2 class="h5 mb-1">Record or upload consultation audio</h2>
                        <p class="text-muted mb-0">Transcribe and prefill the case sheet before saving.</p>
                      </div>
                      <div class="d-flex align-items-center gap-2">
                        <span class="text-muted small">Language:</span>
                        <select id="language-select" class="form-select form-select-sm" style="width:auto">
                          <option value="auto" selected>Auto (Hindi + English)</option>
                          <option value="hi-IN">Hindi</option>
                          <option value="en-IN">English</option>
                        </select>
                      </div>
                    </div>

                    <!-- Tabs -->
                    <ul class="nav nav-tabs mb-3" id="voiceTabs">
                      <li class="nav-item">
                        <button class="nav-link active" id="tab-record" onclick="switchTab('record')">
                          🎙 Record Live
                        </button>
                      </li>
                      <li class="nav-item">
                        <button class="nav-link" id="tab-upload" onclick="switchTab('upload')">
                          📁 Upload File
                        </button>
                      </li>
                    </ul>

                    <!-- Record Tab -->
                    <div id="panel-record">
                      <div class="d-flex align-items-center gap-3 mb-3">
                        <button id="btn-record" class="btn btn-danger" onclick="startRecording()">
                          ⏺ Start Recording
                        </button>
                        <button id="btn-stop" class="btn btn-secondary d-none" onclick="stopRecording()">
                          ⏹ Stop & Transcribe
                        </button>
                        <span id="recording-indicator" class="text-danger d-none">
                          ● Recording...
                        </span>
                      </div>
                      <div id="record-status" class="text-muted small mb-2"></div>
                    </div>

                    <!-- Upload Tab -->
                    <div id="panel-upload" class="d-none">
                      <form method="post"
                            action="/patients/{{ patient.id }}/cases/transcribe-audio"
                            enctype="multipart/form-data">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <input type="hidden" name="language" id="upload-language-input" value="auto">
                        <div class="row g-3 align-items-end">
                          <div class="col-md-8">
                            <label class="form-label">Audio File</label>
                            <input type="file" name="audio_file" class="form-control"
                                   accept=".wav,.mp3,.m4a,.ogg,.flac,.webm" required>
                          </div>
                          <div class="col-md-4">
                            <button class="btn btn-outline-primary w-100">Transcribe Audio</button>
                          </div>
                        </div>
                      </form>
                    </div>

                    <!-- Transcript display (shown after either method) -->
                    <div id="transcript-box" class="mt-4 {% if not voice_transcript %}d-none{% endif %}">
                      <label class="form-label">Transcript</label>
                      <textarea id="transcript-text" class="form-control" rows="5"
                                readonly>{{ voice_transcript }}</textarea>
                    </div>
                  </div>
                </div>
                <form method="post" action="/patients/{{ patient.id }}/cases">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Prakriti</label>
                            <input name="prakriti" class="form-control" placeholder="Vata / Pitta / Kapha" value="{{ prefill_case.get('prakriti', '') }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Working Diagnosis</label>
                            <input name="diagnosis" class="form-control" value="{{ prefill_case.get('diagnosis', '') }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Symptoms</label>
                            <textarea name="symptoms" class="form-control" rows="4" required>{{ prefill_case.get('symptoms', '') }}</textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Clinical Notes</label>
                            <textarea name="notes" class="form-control" rows="4">{{ prefill_case.get('notes', '') }}</textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Follow-up Date</label>
                            <input type="date" name="followup_date" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Follow-up Notes</label>
                            <input name="followup_notes" class="form-control" value="{{ prefill_case.get('followup_notes', '') }}">
                        </div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button class="btn btn-success">Save Case</button>
                        <a href="/patients/{{ patient.id }}/cases" class="btn btn-outline-dark">View Cases</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
<!-- Voice JS — place just before </body> -->
<script>
  let mediaRecorder = null;
  let audioChunks = [];
  const patientId = "{{ patient.id }}";
  const csrfToken = "{{ csrf_token }}";

  function switchTab(tab) {
    document.getElementById("panel-record").classList.toggle("d-none", tab !== "record");
    document.getElementById("panel-upload").classList.toggle("d-none", tab !== "upload");
    document.getElementById("tab-record").classList.toggle("active", tab === "record");
    document.getElementById("tab-upload").classList.toggle("active", tab === "upload");
  }

  function getLanguage() {
    return document.getElementById("language-select").value;
  }

  document.getElementById("language-select").addEventListener("change", function() {
    document.getElementById("upload-language-input").value = this.value;
  });

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.start();
      document.getElementById("btn-record").classList.add("d-none");
      document.getElementById("btn-stop").classList.remove("d-none");
      document.getElementById("recording-indicator").classList.remove("d-none");
      document.getElementById("record-status").textContent = "";
    } catch (err) {
      document.getElementById("record-status").textContent =
        "Microphone access denied. Please allow microphone permission and try again.";
    }
  }

  async function stopRecording() {
    if (!mediaRecorder) return;
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    document.getElementById("btn-stop").classList.add("d-none");
    document.getElementById("recording-indicator").classList.add("d-none");
    document.getElementById("record-status").textContent = "Transcribing...";

    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: "audio/webm" });
      const formData = new FormData();
      formData.append("audio_blob", blob, "recording.webm");
      formData.append("language", getLanguage());
      formData.append("csrf_token", csrfToken);

      try {
        const response = await fetch(
          `/patients/${patientId}/cases/transcribe-live`,
          { method: "POST", body: formData }
        );
        const data = await response.json();

        if (data.error) {
          document.getElementById("record-status").textContent = "Error: " + data.error;
          document.getElementById("btn-record").classList.remove("d-none");
          return;
        }

        document.getElementById("transcript-text").value = data.transcript;
        document.getElementById("transcript-box").classList.remove("d-none");
        document.getElementById("record-status").textContent = "Transcription complete.";
        document.getElementById("btn-record").classList.remove("d-none");

        // Prefill case form fields if available
        if (data.prefill) {
          const p = data.prefill;
          if (p.prakriti) document.querySelector("[name=prakriti]").value = p.prakriti;
          if (p.diagnosis) document.querySelector("[name=diagnosis]").value = p.diagnosis;
          if (p.symptoms) document.querySelector("[name=symptoms]").value = p.symptoms;
          if (p.notes) document.querySelector("[name=notes]").value = p.notes;
          if (p.followup_notes) document.querySelector("[name=followup_notes]").value = p.followup_notes;
        }
      } catch (err) {
        document.getElementById("record-status").textContent = "Transcription failed. Please try again.";
        document.getElementById("btn-record").classList.remove("d-none");
      }
    };
  }
</script>
</body>
</html>

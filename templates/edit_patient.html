<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div>
                                <p class="text-uppercase text-muted small mb-1">Patient Registry</p>
                                <h1 class="h3 mb-0">Edit {{ patient.name }}</h1>
                            </div>
                            <a href="/dashboard" class="btn btn-outline-secondary">Back</a>
                        </div>
                        <form method="post" action="/patients/{{ patient.id }}">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                            <div class="mb-3">
                                <label class="form-label" for="name">Name</label>
                                <input class="form-control" id="name" name="name" value="{{ patient.name }}" required>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label" for="age">Age</label>
                                    <input class="form-control" id="age" name="age" type="number" min="0" value="{{ patient.age }}" required>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label" for="gender">Gender</label>
                                    <input class="form-control" id="gender" name="gender" value="{{ patient.gender }}" required>
                                </div>
                            </div>
                            <div class="row g-3 mt-1">
                                <div class="col-md-6">
                                    <label class="form-label" for="phone">Phone</label>
                                    <input class="form-control" id="phone" name="phone" value="{{ patient.phone or '' }}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="email">Email</label>
                                    <input class="form-control" id="email" name="email" type="email" value="{{ patient.email or '' }}">
                                </div>
                            </div>
                            <div class="mt-3">
                                <label class="form-label" for="address">Address</label>
                                <textarea class="form-control" id="address" name="address" rows="3">{{ patient.address or '' }}</textarea>
                            </div>
                            <div class="d-flex justify-content-end gap-2 mt-4">
                                <a href="/dashboard" class="btn btn-outline-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">Save Patient</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>

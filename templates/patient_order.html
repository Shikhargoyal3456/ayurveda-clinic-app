<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Kash AI | Order Medicines</title>
    <meta property="og:title" content="Kash AI" />
    <meta property="og:description" content="AI-powered Ayurveda clinic management." />
    <meta property="og:site_name" content="Kash AI" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body class="app-shell" style="padding-bottom:120px;">
    <div class="container py-4 py-lg-5">
        <section class="app-topbar mb-4">
            <a href="/" style="display:inline-flex;align-items:center;text-decoration:none;gap:10px;">
                <img src="{{ url_for('static', path='images/kash_ai_logo.svg') }}"
                     alt="Kash AI"
                     style="height:40px;width:auto;">
            </a>
            <div>
                <p class="eyebrow mb-1">Order Medicines</p>
                <strong>Fast delivery from nearby pharmacies</strong>
            </div>
        </section>

        <section class="dashboard-hero mb-4">
            <div>
                <p class="eyebrow mb-2">Medicine Delivery</p>
                <h1 class="dashboard-title">Order Medicines</h1>
                <p class="dashboard-subtitle mb-0">Fast delivery from nearby pharmacies</p>
            </div>
        </section>

        <section class="mb-4">
            <div class="mb-3">
                <label for="symptoms" class="form-label">Symptoms</label>
                <textarea id="symptoms" class="form-control" rows="4" placeholder="Describe your symptoms..."></textarea>
            </div>
            <button type="button" id="aiButton" class="btn btn-primary rounded-pill">Get AI Suggestions</button>
            <div id="aiResult" class="alert alert-light border mt-3 mb-0 d-none"></div>
        </section>

        <section class="mb-4">
            <div class="mb-3">
                <label for="medicineSearch" class="form-label">Search medicines</label>
                <input id="medicineSearch" class="form-control" type="search" placeholder="Search by medicine name">
            </div>
            <div id="medicineList" class="list-group"></div>
            <p id="medicineEmpty" class="text-muted mt-3 mb-0 d-none">No medicines found.</p>
        </section>

        <section class="mb-4">
            <p class="eyebrow mb-2">Nearby Pharmacies</p>

            <button id="findPharmaciesBtn" type="button" class="btn btn-outline-primary rounded-pill mb-3">
                Find Nearby Pharmacies
            </button>

            <div id="pharmacyList"></div>

            <input type="hidden" id="nearby_place_id" name="nearby_place_id">
        </section>

        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <p class="eyebrow mb-1">Cart</p>
                    <h2 class="h5 mb-0">Selected medicines</h2>
                </div>
                <strong id="cartTotal">Rs 0</strong>
            </div>
            <div id="cartItems" class="list-group"></div>
            <p id="cartEmpty" class="text-muted mb-0">No medicines selected yet</p>
        </section>

        <section class="mb-4">
            <form id="orderForm" method="post" action="/patient/order/create">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <input type="hidden" id="medicines_json" name="medicines_json">
                <input type="hidden" id="pharmacyId" name="pharmacy_id">

                <div class="mb-3">
                    <label for="patientName" class="form-label">Name</label>
                    <input id="patientName" name="patient_name" class="form-control" type="text" autocomplete="name" required>
                </div>
                <div class="mb-3">
                    <label for="patientPhone" class="form-label">Phone</label>
                    <input id="patientPhone" name="patient_phone" class="form-control" type="tel" pattern="[0-9]{10}" autocomplete="tel" required>
                </div>
                <div class="mb-3">
                    <label for="patientAddress" class="form-label">Address</label>
                    <textarea id="patientAddress" name="patient_address" class="form-control" rows="3" autocomplete="street-address" required></textarea>
                </div>
                <button id="orderButton" class="btn btn-dark btn-lg rounded-pill w-100" type="submit">Proceed to Payment</button>
                <div id="orderMessage" class="alert alert-light border mt-3 mb-0 d-none"></div>
            </form>
        </section>
    </div>

    <div class="fixed-bottom bg-white border-top p-3">
        <div class="container">
            <div class="d-flex justify-content-between">
                <strong>Total:</strong>
                <strong id="totalAmount">₹0</strong>
            </div>
            <button id="stickyOrderButton" class="btn btn-primary w-100 rounded-pill mt-2" type="submit" form="orderForm">
                Proceed to Payment
            </button>
        </div>
    </div>

    <script>
        const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
        const medicineList = document.getElementById("medicineList");
        const medicineEmpty = document.getElementById("medicineEmpty");
        const medicineSearch = document.getElementById("medicineSearch");
        const cartItems = document.getElementById("cartItems");
        const cartEmpty = document.getElementById("cartEmpty");
        const cartTotal = document.getElementById("cartTotal");
        const medicinesJson = document.getElementById("medicines_json");
        const pharmacyId = document.getElementById("pharmacyId");
        const orderForm = document.getElementById("orderForm");
        const orderButton = document.getElementById("orderButton");
        const stickyOrderButton = document.getElementById("stickyOrderButton");
        const orderMessage = document.getElementById("orderMessage");
        const aiButton = document.getElementById("aiButton");
        const aiResult = document.getElementById("aiResult");
        const symptoms = document.getElementById("symptoms");
        const totalAmount = document.getElementById("totalAmount");
        const pharmacyList = document.getElementById("pharmacyList");
        const pharmacyInput = document.getElementById("nearby_place_id");

        let medicines = [];
        let cart = [];

        function money(value) {
            return `₹${Number(value || 0)}`;
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function updateTotal() {
            const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
            cartTotal.textContent = money(total);
            totalAmount.textContent = money(total);
        }

        function selectedPharmacyId() {
            return cart.length ? cart[0].pharmacy_id : "";
        }

        function renderMedicines() {
            const query = medicineSearch.value.trim().toLowerCase();
            const visible = medicines.filter((medicine) => medicine.name.toLowerCase().includes(query));
            medicineList.innerHTML = "";
            medicineEmpty.classList.toggle("d-none", visible.length > 0);

            visible.forEach((medicine) => {
                const row = document.createElement("div");
                row.className = "list-group-item d-flex justify-content-between align-items-center gap-3";
                row.innerHTML = `
                    <div>
                        <strong>${medicine.name}</strong>
                        <div class="text-muted small">${medicine.category || "Medicine"} · ${money(medicine.price)} / ${medicine.unit}</div>
                    </div>
                    <button type="button" class="btn btn-outline-primary rounded-pill btn-sm">Add</button>
                `;
                row.querySelector("button").addEventListener("click", () => addToCart(medicine));
                medicineList.appendChild(row);
            });
        }

        function renderCart() {
            cartItems.innerHTML = "";
            cartEmpty.classList.toggle("d-none", cart.length > 0);
            pharmacyId.value = selectedPharmacyId();

            cart.forEach((item) => {
                const row = document.createElement("div");
                row.className = "list-group-item";
                row.innerHTML = `
                    <div class="d-flex justify-content-between gap-3 mb-2">
                        <div>
                            <strong>${item.name}</strong>
                            <div class="text-muted small">${money(item.price)} each</div>
                        </div>
                        <button type="button" class="btn btn-outline-danger rounded-pill btn-sm">Remove</button>
                    </div>
                    <label class="form-label small mb-1">Quantity</label>
                    <input class="form-control" type="number" min="1" value="${item.qty}">
                `;
                row.querySelector("button").addEventListener("click", () => {
                    cart = cart.filter((cartItem) => cartItem.medicine_id !== item.medicine_id);
                    renderCart();
                });
                row.querySelector("input").addEventListener("input", (event) => {
                    item.qty = Math.max(1, Number(event.target.value || 1));
                    renderCart();
                });
                cartItems.appendChild(row);
            });

            updateTotal();
        }

        function addToCart(medicine) {
            if (cart.length && selectedPharmacyId() !== medicine.pharmacy_id) {
                orderMessage.textContent = "Please order from one pharmacy at a time.";
                orderMessage.classList.remove("d-none");
                return;
            }
            const existing = cart.find((item) => item.medicine_id === medicine.id);
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({
                    medicine_id: medicine.id,
                    name: medicine.name,
                    price: medicine.price,
                    qty: 1,
                    pharmacy_id: medicine.pharmacy_id,
                });
            }
            orderMessage.classList.add("d-none");
            renderCart();
        }

        async function loadMedicines() {
            const response = await fetch("/patient/medicines");
            medicines = await response.json();
            renderMedicines();
        }

        medicineSearch.addEventListener("input", renderMedicines);

        document.getElementById("findPharmaciesBtn").addEventListener("click", () => {
            if (!navigator.geolocation) {
                alert("Geolocation not supported");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;

                pharmacyList.innerHTML = "Loading...";

                try {
                    const res = await fetch(`/patient/nearby-pharmacies?lat=${lat}&lng=${lng}`);
                    const data = await res.json();

                    pharmacyList.innerHTML = "";

                    if (!data.length) {
                        pharmacyList.innerHTML = "<p class='text-muted'>No pharmacies found</p>";
                        return;
                    }

                    data.forEach((pharmacy) => {
                        const div = document.createElement("div");
                        div.className = "card mb-2 p-2";

                        div.innerHTML = `
                            <div class="d-flex justify-content-between">
                                <div>
                                    <strong>${pharmacy.name}</strong><br>
                                    <small>${pharmacy.vicinity}</small><br>
                                    <small>⭐ ${pharmacy.rating || "N/A"}</small><br>
                                    <small>${pharmacy.open_now ? "🟢 Open" : "🔴 Closed"}</small>
                                </div>
                                <button class="btn btn-sm btn-primary">Select</button>
                            </div>
                        `;

                        const selectButton = div.querySelector("button");
                        selectButton.onclick = () => {
                            pharmacyInput.value = pharmacy.place_id;
                            document.querySelectorAll("#pharmacyList .card").forEach(el => el.classList.remove("border-primary"));
                            document.querySelectorAll("#pharmacyList button").forEach(btn => {
                                btn.disabled = false;
                                btn.innerText = "Select";
                            });
                            div.classList.add("border-primary");
                            selectButton.disabled = true;
                            selectButton.innerText = "Selected";
                            alert(`Selected: ${pharmacy.name}`);
                        };

                        pharmacyList.appendChild(div);
                    });

                } catch (err) {
                    pharmacyList.innerHTML = "<p class='text-danger'>Failed to load pharmacies</p>";
                }
            });
        });

        aiButton.addEventListener("click", async () => {
            aiButton.disabled = true;
            aiButton.textContent = "Getting suggestions...";
            aiResult.classList.add("d-none");
            try {
                const formData = new FormData();
                formData.append("symptoms", symptoms.value);
                formData.append("csrf_token", csrfToken);
                const response = await fetch("/patient/ai-suggest", {
                    method: "POST",
                    body: formData,
                });
                const payload = await response.json();
                aiResult.innerHTML = `<pre class="mb-0 text-wrap">${escapeHtml(payload.suggestion || payload.error || "No suggestions available.")}</pre>`;
                aiResult.classList.remove("d-none");
            } catch (error) {
                aiResult.innerHTML = '<pre class="mb-0 text-wrap">AI suggestions are temporarily unavailable.</pre>';
                aiResult.classList.remove("d-none");
            } finally {
                aiButton.disabled = false;
                aiButton.textContent = "Get AI Suggestions";
            }
        });

        orderForm.addEventListener("submit", (event) => {
            if (!cart.length) {
                event.preventDefault();
                orderMessage.textContent = "Add at least one medicine before placing the order.";
                orderMessage.classList.remove("d-none");
                return;
            }
            if (!selectedPharmacyId()) {
                event.preventDefault();
                alert("Please select a pharmacy");
                return;
            }
            medicinesJson.value = JSON.stringify(cart);
            pharmacyId.value = selectedPharmacyId();
            orderButton.disabled = true;
            stickyOrderButton.disabled = true;
            orderButton.textContent = "Processing...";
            stickyOrderButton.textContent = "Processing...";
        });

        document.addEventListener("DOMContentLoaded", () => {
            loadMedicines().catch(() => {
                medicineEmpty.textContent = "Medicines are temporarily unavailable.";
                medicineEmpty.classList.remove("d-none");
            });
        });
    </script>
</body>
</html>

{% extends 'base.html' %}
{% block title %}AI Assistant | Kash AI{% endblock %}
{% block page %}
<div class="site-container section-stack fade-in-up">
<section class="ai-customer-support card"><div class="chat-header"><i class="fas fa-robot"></i><h3>AI Health Assistant</h3><span class="status-pill status-confirmed">Online</span></div><div class="chat-messages stack-list mt-4" id="chatMessages"><div class="stack-item">Hi. I can help with medicine information, order tracking, lab tests, appointments, and refill guidance.</div></div><div class="hero-actions mt-3"><input type="text" id="userMessage" class="form-control" placeholder="Type your question..."><button id="sendSupportMessage" class="btn btn-primary" type="button"><i class="fas fa-paper-plane"></i></button></div><div class="quick-actions hero-actions mt-3"><button class="btn btn-outline-dark btn-sm quick-support" data-message="track my order" type="button">Track Order</button><button class="btn btn-outline-dark btn-sm quick-support" data-message="refill prescription" type="button">Refill Prescription</button><button class="btn btn-outline-dark btn-sm quick-support" data-message="book lab test" type="button">Book Lab Test</button><button class="btn btn-outline-dark btn-sm quick-support" data-message="consult doctor" type="button">Consult Doctor</button></div></section>
</div>
{% endblock %}
{% block extra_scripts %}<script src="{{ url_for('static', path='js/superapp/support.js') }}"></script>{% endblock %}

<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Kash AI logo</title>
<desc>Kash AI logo with a lotus-inspired hexagon icon and modern wordmark</desc>
<style>
  .petal-outer { fill: #0f7a52; }
  .petal-inner { fill: #16a067; }
  .center-ring { fill: #0a5c3c; }
  .center-dot { fill: #22c68a; }
  .spark-line { stroke: #22c68a; }
  .word-kash { fill: #0a2e1e; }
  .word-ai { fill: #0f7a52; }
  .tagline { fill: #3a9e72; }
  .hex-stroke { stroke: #0f7a52; }
</style>
<polygon points="160,80 220,112 220,208 160,240 100,208 100,112"
         fill="#e8f5f0" stroke="#0f7a52" stroke-width="2.5"/>
<ellipse cx="160" cy="118" rx="10" ry="22" class="petal-outer" transform="rotate(0 160 160)"/>
<ellipse cx="160" cy="120" rx="6" ry="16" class="petal-inner" transform="rotate(0 160 160)"/>
<ellipse cx="160" cy="118" rx="10" ry="22" class="petal-outer" transform="rotate(60 160 160)"/>
<ellipse cx="160" cy="120" rx="6" ry="16" class="petal-inner" transform="rotate(60 160 160)"/>
<ellipse cx="160" cy="118" rx="10" ry="22" class="petal-outer" transform="rotate(120 160 160)"/>
<ellipse cx="160" cy="120" rx="6" ry="16" class="petal-inner" transform="rotate(120 160 160)"/>
<ellipse cx="160" cy="118" rx="10" ry="22" class="petal-outer" transform="rotate(180 160 160)"/>
<ellipse cx="160" cy="120" rx="6" ry="16" class="petal-inner" transform="rotate(180 160 160)"/>
<ellipse cx="160" cy="118" rx="10" ry="22" class="petal-outer" transform="rotate(240 160 160)"/>
<ellipse cx="160" cy="120" rx="6" ry="16" class="petal-inner" transform="rotate(240 160 160)"/>
<ellipse cx="160" cy="118" rx="10" ry="22" class="petal-outer" transform="rotate(300 160 160)"/>
<ellipse cx="160" cy="120" rx="6" ry="16" class="petal-inner" transform="rotate(300 160 160)"/>
<circle cx="160" cy="160" r="22" class="center-ring"/>
<circle cx="160" cy="160" r="14" class="center-dot"/>
<line x1="160" y1="150" x2="160" y2="154" class="spark-line" stroke-width="2" stroke-linecap="round"/>
<line x1="160" y1="166" x2="160" y2="170" class="spark-line" stroke-width="2" stroke-linecap="round"/>
<line x1="150" y1="160" x2="154" y2="160" class="spark-line" stroke-width="2" stroke-linecap="round"/>
<line x1="166" y1="160" x2="170" y2="160" class="spark-line" stroke-width="2" stroke-linecap="round"/>
<circle cx="160" cy="160" r="3" fill="#e8f5f0"/>
<text x="260" y="148" font-family="Georgia, serif" font-size="72" font-weight="700" letter-spacing="-2" class="word-kash">Kash</text>
<text x="452" y="148" font-family="Georgia, serif" font-size="72" font-weight="700" class="word-ai">AI</text>
<text x="261" y="178" font-family="Arial, sans-serif" font-size="15" letter-spacing="3" class="tagline">SMART CLINIC PLATFORM</text>
<line x1="261" y1="188" x2="560" y2="188" class="hex-stroke" stroke-width="0.5" opacity="0.4"/>
<text x="261" y="208" font-family="Arial, sans-serif" font-size="12" letter-spacing="1" class="tagline" opacity="0.7">AI · E-Pharma · Teleconsult · Multi-specialty</text>
</svg>

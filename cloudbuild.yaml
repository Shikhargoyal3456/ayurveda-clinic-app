# DEPLOY-FULL-1: Build and deploy the Ayurveda service to Cloud Run.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/kash-ai
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/kash-ai
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - kash-ai
      - --image
      - gcr.io/$PROJECT_ID/kash-ai
      - --platform
      - managed
      - --region
      - ${_REGION}
      - --memory
      - 512Mi
      - --concurrency
      - "80"
      - --allow-unauthenticated
images:
  - gcr.io/$PROJECT_ID/kash-ai
substitutions:
  _REGION: us-central1

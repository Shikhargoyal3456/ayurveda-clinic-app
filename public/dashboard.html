<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kash AI Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18201b;
      --muted: #66736b;
      --line: #d9e3dc;
      --green: #147a4b;
      --green-soft: #e6f6ec;
      --yellow-soft: #fff4c8;
      --blue-soft: #e8f1ff;
      --bg: #f7faf8;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 32px auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }

    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: clamp(1.8rem, 3vw, 2.6rem); margin-bottom: 6px; }
    h2 { font-size: 1.25rem; margin-bottom: 14px; }
    h3 { font-size: 1rem; margin-bottom: 8px; }
    p { color: var(--muted); line-height: 1.55; }

    .scanner-grid {
      display: grid;
      grid-template-columns: minmax(280px, 0.9fr) minmax(320px, 1.1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
    }

    .upload-box {
      display: grid;
      place-items: center;
      min-height: 220px;
      border: 2px dashed #91bca5;
      border-radius: 8px;
      background: #fbfdfc;
      text-align: center;
      padding: 22px;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease;
    }

    .upload-box.dragging {
      border-color: var(--green);
      background: var(--green-soft);
    }

    .upload-icon { font-size: 2.1rem; margin-bottom: 8px; }
    .file-name { margin-top: 10px; color: var(--green); font-weight: 700; word-break: break-word; }

    label {
      display: block;
      margin: 16px 0 8px;
      color: #334139;
      font-weight: 700;
      font-size: 0.94rem;
    }

    input[type="tel"] {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      color: white;
      background: var(--green);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary { background: #245078; }
    button:disabled { opacity: 0.58; cursor: not-allowed; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }

    .status {
      margin-top: 14px;
      min-height: 24px;
      color: var(--muted);
      font-weight: 650;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      background: var(--green-soft);
      color: #0f673e;
      padding: 5px 10px;
      font-weight: 800;
      font-size: 0.9rem;
    }

    details {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
      background: #ffffff;
    }

    summary {
      cursor: pointer;
      font-weight: 850;
      color: #24352b;
    }

    .advice {
      background: var(--green-soft);
      border-left: 4px solid var(--green);
      padding: 14px;
      border-radius: 6px;
      white-space: pre-wrap;
      margin-top: 14px;
    }

    .disclaimer {
      background: var(--yellow-soft);
      border-left: 4px solid #c99a07;
      padding: 14px;
      border-radius: 6px;
      white-space: pre-wrap;
      margin-top: 14px;
      color: #4b3a09;
    }

    .analysis-text {
      background: var(--blue-soft);
      border-radius: 8px;
      padding: 14px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin-top: 14px;
      color: #203247;
    }

    .empty-state {
      min-height: 300px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 24px;
    }

    @media (max-width: 820px) {
      main { width: min(100% - 20px, 720px); margin-top: 20px; }
      .topbar { display: block; }
      .scanner-grid { grid-template-columns: 1fr; }
      .panel { padding: 16px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <h1>Kash AI Smart Clinic</h1>
        <p>WhatsApp prescription analysis workspace</p>
      </div>
    </div>

    <section class="scanner-grid" aria-labelledby="scanner-title">
      <div class="panel">
        <h2 id="scanner-title">🔍 Prescription Scanner</h2>
        <form id="scanForm">
          <input id="imageInput" name="image" type="file" accept="image/jpeg,image/png,application/pdf" hidden>
          <div id="uploadBox" class="upload-box" role="button" tabindex="0">
            <div>
              <div class="upload-icon">📋</div>
              <h3>Drop prescription image here</h3>
              <p>JPG, PNG, or PDF files are supported.</p>
              <div id="fileName" class="file-name"></div>
            </div>
          </div>

          <label for="phoneInput">Patient WhatsApp number</label>
          <input id="phoneInput" name="phone" type="tel" placeholder="+919350397175" autocomplete="tel">

          <div class="actions">
            <button id="scanButton" type="submit">🔍 Scan & Analyze Prescription</button>
            <button id="sendButton" class="secondary" type="button" disabled>📱 Send Analysis to Patient WhatsApp</button>
          </div>
          <div id="status" class="status" aria-live="polite"></div>
        </form>
      </div>

      <div class="panel">
        <h2>Analysis Results</h2>
        <div id="results" class="empty-state">
          <p>Upload a prescription to see detected medicines, side effects, benefits, healthy advice, and safety notes.</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('scanForm');
    const uploadBox = document.getElementById('uploadBox');
    const imageInput = document.getElementById('imageInput');
    const fileName = document.getElementById('fileName');
    const phoneInput = document.getElementById('phoneInput');
    const scanButton = document.getElementById('scanButton');
    const sendButton = document.getElementById('sendButton');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    let lastFile = null;
    let lastAnalysis = '';

    function setFile(file) {
      lastFile = file;
      fileName.textContent = file ? file.name : '';
      sendButton.disabled = true;
    }

    function sectionBetween(text, startPattern, endPattern) {
      const start = text.search(startPattern);
      if (start < 0) return '';
      const afterStart = text.slice(start);
      const end = afterStart.slice(1).search(endPattern);
      return end < 0 ? afterStart.trim() : afterStart.slice(0, end + 1).trim();
    }

    function extractMedicines(text) {
      const section = sectionBetween(text, /MEDICINES DETECTED/i, /\n\s*\d+\./);
      return section
        .split('\n')
        .map((line) => line.replace(/^[-*•\d.\s]+/, '').trim())
        .filter((line) => line && !/medicines detected/i.test(line))
        .slice(0, 12);
    }

    function renderResults(analysis) {
      lastAnalysis = analysis;
      const meds = extractMedicines(analysis);
      const advice = sectionBetween(analysis, /HEALTHY ADVICE/i, /\n\s*6\./i);
      const disclaimerIndex = analysis.indexOf('⚕️ IMPORTANT DISCLAIMER:');
      const disclaimer = disclaimerIndex >= 0 ? analysis.slice(disclaimerIndex).trim() : '';
      const medicineDetails = sectionBetween(analysis, /MEDICINE DETAILS/i, /\n\s*3\./i);
      const sideEffects = sectionBetween(analysis, /SIDE EFFECTS/i, /\n\s*4\./i);
      const benefits = sectionBetween(analysis, /BENEFITS/i, /\n\s*5\./i);

      resultsEl.className = '';
      resultsEl.innerHTML = `
        <h3>Detected medicines</h3>
        <div class="badges">${meds.length ? meds.map((med) => `<span class="badge">${escapeHtml(med)}</span>`).join('') : '<span class="badge">Review full analysis</span>'}</div>
        <details open><summary>💊 Medicine details</summary><div class="analysis-text">${escapeHtml(medicineDetails || analysis)}</div></details>
        <details><summary>⚠️ Side effects</summary><div class="analysis-text">${escapeHtml(sideEffects || 'See full analysis below.')}</div></details>
        <details><summary>✅ Benefits</summary><div class="analysis-text">${escapeHtml(benefits || 'See full analysis below.')}</div></details>
        <div class="advice">${escapeHtml(advice || 'Healthy advice will appear here when available.')}</div>
        <div class="disclaimer">${escapeHtml(disclaimer || 'Please consult a qualified healthcare professional before making medication changes.')}</div>
        <details><summary>Full WhatsApp reply</summary><div class="analysis-text">${escapeHtml(analysis)}</div></details>
      `;
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    async function scanPrescription(sendToWhatsApp) {
      if (!lastFile) {
        statusEl.textContent = 'Choose a prescription file first.';
        return;
      }

      const data = new FormData();
      data.append('image', lastFile);
      if (sendToWhatsApp && phoneInput.value.trim()) {
        data.append('phone', phoneInput.value.trim());
      }

      scanButton.disabled = true;
      sendButton.disabled = true;
      statusEl.textContent = sendToWhatsApp ? 'Sending analysis to WhatsApp...' : 'Scanning prescription...';

      try {
        const response = await fetch('/prescriptions/scan', { method: 'POST', body: data });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || 'Scan failed.');
        }
        renderResults(payload.analysis);
        sendButton.disabled = !phoneInput.value.trim();
        statusEl.textContent = payload.whatsapp?.sent ? 'Analysis sent to patient WhatsApp.' : 'Analysis complete.';
      } catch (error) {
        statusEl.textContent = error.message;
      } finally {
        scanButton.disabled = false;
        if (lastAnalysis && phoneInput.value.trim()) {
          sendButton.disabled = false;
        }
      }
    }

    uploadBox.addEventListener('click', () => imageInput.click());
    uploadBox.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        imageInput.click();
      }
    });
    imageInput.addEventListener('change', () => setFile(imageInput.files[0]));

    ['dragenter', 'dragover'].forEach((name) => {
      uploadBox.addEventListener(name, (event) => {
        event.preventDefault();
        uploadBox.classList.add('dragging');
      });
    });
    ['dragleave', 'drop'].forEach((name) => {
      uploadBox.addEventListener(name, (event) => {
        event.preventDefault();
        uploadBox.classList.remove('dragging');
      });
    });
    uploadBox.addEventListener('drop', (event) => {
      const file = event.dataTransfer.files[0];
      if (file) {
        imageInput.files = event.dataTransfer.files;
        setFile(file);
      }
    });

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      scanPrescription(false);
    });
    sendButton.addEventListener('click', () => scanPrescription(true));
    phoneInput.addEventListener('input', () => {
      sendButton.disabled = !lastAnalysis || !phoneInput.value.trim();
    });
  </script>
</body>
</html>
